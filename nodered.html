<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guía Interactiva: Node-RED y MQTT</title>
    <!-- Cargando librerías necesarias desde CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes pulse-custom {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
        .animate-pulse-custom { animation: pulse-custom 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        
        .fade-enter { opacity: 0; transform: translateY(10px); }
        .fade-enter-active { opacity: 1; transform: translateY(0); transition: all 500ms ease-out; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        // Definición manual de iconos SVG para evitar errores de librerías externas
        const Icons = {
            Cpu: (props) => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                    <rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="15" x2="23" y2="15"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="15" x2="4" y2="15"/>
                </svg>
            ),
            Network: (props) => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                    <rect x="16" y="16" width="6" height="6" rx="1"/><rect x="2" y="16" width="6" height="6" rx="1"/><rect x="9" y="2" width="6" height="6" rx="1"/><path d="M5 16v-3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3"/><path d="M12 12V8"/>
                </svg>
            ),
            Send: (props) => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                    <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
            ),
            Radio: (props) => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                    <circle cx="12" cy="12" r="2"/><path d="M16.24 7.76a6 6 0 0 1 0 8.49"/><path d="M17.66 4.34a10 10 0 0 1 0 15.32"/><path d="M7.76 7.76a6 6 0 0 0 0 8.49"/><path d="M6.34 4.34a10 10 0 0 0 0 15.32"/>
                </svg>
            ),
            Layers: (props) => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                    <polygon points="12 2 2 7 12 12 22 7 12 2"/><polygon points="2 17 12 22 22 17"/><polygon points="2 12 12 17 22 12"/>
                </svg>
            ),
            Zap: (props) => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                </svg>
            ),
            ArrowRight: (props) => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                    <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
                </svg>
            ),
            ArrowLeft: (props) => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                    <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
                </svg>
            ),
            Terminal: (props) => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                    <polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>
                </svg>
            ),
            Share2: (props) => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                    <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                </svg>
            ),
            Play: (props) => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                    <polygon points="5 3 19 12 5 21 5 3"/>
                </svg>
            ),
            MessageSquare: (props) => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                </svg>
            ),
            Battery: (props) => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                    <rect x="1" y="6" width="18" height="12" rx="2" ry="2"/><line x1="23" y1="13" x2="23" y2="11"/>
                </svg>
            ),
            Wifi: (props) => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                    <path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/>
                </svg>
            ),
            Factory: (props) => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                    <path d="M2 20V9l4 2V9l4 2V9l4 2V9l4 2v9H2z"/><path d="M18 5.7L22 9v11"/>
                </svg>
            ),
            TrendingUp: (props) => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                    <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>
                </svg>
            ),
            Settings: (props) => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                    <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
            ),
            ShieldCheck: (props) => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/>
                </svg>
            ),
            CheckCircle: (props) => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
                </svg>
            ),
            Flag: (props) => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                    <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/>
                </svg>
            ),
            Home: (props) => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                    <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
            )
        };

        const App = () => {
            const [activeSection, setActiveSection] = React.useState('intro');
            const [isSimulating, setIsSimulating] = React.useState(false);
            const [messages, setMessages] = React.useState([]);
            const [activeTopic] = React.useState('casa/sala/temperatura');

            const simulatePublish = () => {
                if (isSimulating) return;
                setIsSimulating(true);
                
                const newMessage = {
                    id: Date.now(),
                    value: Math.floor(Math.random() * (30 - 18 + 1)) + 18,
                    topic: activeTopic,
                    timestamp: new Date().toLocaleTimeString()
                };

                setTimeout(() => {
                    setMessages(prev => [newMessage, ...prev].slice(0, 5));
                    setIsSimulating(false);
                }, 1500);
            };

            const sections = {
                intro: {
                    title: "¿Qué es Node-RED?",
                    icon: Icons.Cpu,
                    color: "text-red-500",
                    bg: "bg-red-50",
                    border: "border-red-100",
                    content: (
                        <div className="space-y-6">
                            <p className="text-lg text-gray-700">
                                Node-RED es una herramienta de programación visual basada en flujos, desarrollada originalmente por IBM y ahora parte de la <strong>OpenJS Foundation</strong>.
                            </p>
                            <div className="grid md:grid-cols-2 gap-4 mt-6">
                                <div className="bg-red-50 p-4 rounded-xl border border-red-100">
                                    <h4 className="font-bold text-red-700 flex items-center gap-2">
                                        <Icons.Layers className="w-5 h-5" /> Programación Visual
                                    </h4>
                                    <p className="text-sm text-gray-600">Conecta nodos físicos, APIs y servicios en la nube de forma intuitiva sin escribir código complejo.</p>
                                </div>
                                <div className="bg-red-50 p-4 rounded-xl border border-red-100">
                                    <h4 className="font-bold text-red-700 flex items-center gap-2">
                                        <Icons.Zap className="w-5 h-5" /> Basado en Node.js
                                    </h4>
                                    <p className="text-sm text-gray-600">Ligero y eficiente, ideal para ejecutarse en hardware como Raspberry Pi o entornos industriales.</p>
                                </div>
                            </div>
                            <div className="pt-6 border-t border-slate-100 mt-8">
                                <button onClick={() => setActiveSection('mqtt')} className="w-full md:w-auto flex items-center justify-center gap-3 bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-2xl font-bold transition-all transform hover:scale-105 shadow-lg shadow-blue-200">
                                    Siguiente: Descubrir MQTT <Icons.ArrowRight className="w-5 h-5" />
                                </button>
                            </div>
                        </div>
                    )
                },
                mqtt: {
                    title: "Protocolo MQTT",
                    icon: Icons.Network,
                    color: "text-blue-500",
                    bg: "bg-blue-50",
                    border: "border-blue-100",
                    content: (
                        <div className="space-y-6">
                            <div className="bg-blue-600 rounded-2xl p-6 text-white mb-8">
                                <h4 className="text-xl font-bold flex items-center gap-2 mb-2">
                                    <Icons.MessageSquare className="w-6 h-6" /> El "WhatsApp" de las máquinas
                                </h4>
                                <p className="opacity-90">Es un lenguaje sencillo que permite a los sensores enviar mensajes cortos y rápidos de forma eficiente.</p>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div className="p-5 bg-white border border-slate-200 rounded-2xl shadow-sm hover:border-blue-300 transition-colors">
                                    <div className="w-10 h-10 bg-blue-50 rounded-full flex items-center justify-center mb-4 text-blue-600"><Icons.Send className="w-5 h-5" /></div>
                                    <h5 className="font-bold text-slate-800 mb-1">Ultra Ligero</h5>
                                    <p className="text-sm text-slate-500">Mínimo consumo de datos.</p>
                                </div>
                                <div className="p-5 bg-white border border-slate-200 rounded-2xl shadow-sm hover:border-blue-300 transition-colors">
                                    <div className="w-10 h-10 bg-green-50 rounded-full flex items-center justify-center mb-4 text-green-600"><Icons.Battery className="w-5 h-5" /></div>
                                    <h5 className="font-bold text-slate-800 mb-1">Ahorra Batería</h5>
                                    <p className="text-sm text-slate-500">Ideal para dispositivos remotos.</p>
                                </div>
                                <div className="p-5 bg-white border border-slate-200 rounded-2xl shadow-sm hover:border-blue-300 transition-colors">
                                    <div className="w-10 h-10 bg-purple-50 rounded-full flex items-center justify-center mb-4 text-purple-600"><Icons.Wifi className="w-5 h-5" /></div>
                                    <h5 className="font-bold text-slate-800 mb-1">Resiliente</h5>
                                    <p className="text-sm text-slate-500">Tolera conexiones inestables.</p>
                                </div>
                            </div>
                            <div className="pt-6 border-t border-slate-100 mt-8 flex flex-col md:flex-row gap-4">
                                <button onClick={() => setActiveSection('intro')} className="flex items-center justify-center gap-3 bg-slate-100 hover:bg-slate-200 text-slate-700 px-8 py-4 rounded-2xl font-bold transition-all"><Icons.ArrowLeft className="w-5 h-5" /> Volver</button>
                                <button onClick={() => setActiveSection('pubsub')} className="flex-1 flex items-center justify-center gap-3 bg-green-600 hover:bg-green-700 text-white px-8 py-4 rounded-2xl font-bold transition-all transform hover:scale-105 shadow-lg shadow-green-200">Probar el Simulador <Icons.Play className="w-5 h-5" /></button>
                            </div>
                        </div>
                    )
                },
                pubsub: {
                    title: "Publicador y Suscriptor",
                    icon: Icons.Share2,
                    color: "text-green-500",
                    bg: "bg-green-50",
                    border: "border-green-100",
                    content: (
                        <div className="space-y-6">
                            <p className="text-lg text-gray-700">MQTT usa un patrón de <strong>Publicación/Suscripción</strong> mediado por un <strong>Broker</strong> central.</p>
                            <div className="relative bg-slate-900 rounded-2xl p-8 overflow-hidden">
                                <div className="flex justify-between items-center relative z-10">
                                    <div className="flex flex-col items-center gap-2">
                                        <div className={`w-16 h-16 rounded-full flex items-center justify-center bg-blue-500 text-white shadow-lg transition-transform ${isSimulating ? 'scale-110' : ''}`}><Icons.Radio className="w-8 h-8" /></div>
                                        <span className="text-[10px] text-blue-300 font-mono uppercase">Publicador</span>
                                        <button onClick={simulatePublish} disabled={isSimulating} className="mt-2 bg-blue-600 hover:bg-blue-500 text-white px-3 py-1 rounded-full text-xs font-bold disabled:opacity-50">{isSimulating ? '...' : 'Publicar'}</button>
                                    </div>
                                    <div className="flex flex-col items-center gap-2">
                                        <div className="w-20 h-20 md:w-24 md:h-24 rounded-2xl border-2 border-dashed border-slate-700 flex flex-col items-center justify-center text-slate-400">
                                            <span className="text-[8px] font-mono mb-1">BROKER</span>
                                            <div className="w-10 h-10 md:w-12 md:h-12 bg-slate-800 rounded-lg flex items-center justify-center"><Icons.Network className="w-5 h-5 md:w-6 md:h-6 text-white" /></div>
                                        </div>
                                    </div>
                                    <div className="flex flex-col gap-4">
                                        <div className="flex items-center gap-3">
                                            <div className="w-10 h-10 md:w-12 md:h-12 rounded-lg bg-green-600 flex items-center justify-center shadow-md"><Icons.Terminal className="w-5 h-5 md:w-6 md:h-6 text-white" /></div>
                                            <div className="flex flex-col text-[8px]"><span className="text-green-400 font-mono">SUSC. A</span><span className="text-slate-500">casa/#</span></div>
                                        </div>
                                        <div className="flex items-center gap-3 opacity-60">
                                            <div className="w-10 h-10 md:w-12 md:h-12 rounded-lg bg-purple-600 flex items-center justify-center shadow-md"><Icons.Layers className="w-5 h-5 md:w-6 md:h-6 text-white" /></div>
                                            <div className="flex flex-col text-[8px]"><span className="text-purple-400 font-mono">SUSC. B</span><span className="text-slate-500">sensores/#</span></div>
                                        </div>
                                    </div>
                                </div>
                                {isSimulating && (
                                    <React.Fragment>
                                        <div className="absolute top-1/2 left-[20%] w-[30%] h-1 bg-blue-400 shadow-[0_0_15px_rgba(96,165,250,0.8)] animate-pulse-custom" />
                                        <div className="absolute top-1/2 left-[50%] w-[30%] h-1 bg-green-400 shadow-[0_0_15px_rgba(74,222,128,0.8)] animate-pulse-custom" />
                                    </React.Fragment>
                                )}
                                <div className="mt-8 bg-black/50 rounded-lg p-4 font-mono text-[10px] md:text-[11px]">
                                    <div className="text-slate-500 mb-2 border-b border-slate-800 pb-1 uppercase tracking-widest">Monitor MQTT</div>
                                    {messages.length === 0 ? <div className="text-slate-600 italic">Esperando mensajes...</div> : 
                                    messages.map(m => (
                                        <div key={m.id} className="text-green-400 flex gap-2 mb-1">
                                            <span className="text-slate-500">[{m.timestamp}]</span>
                                            <span>PUB:</span><span className="text-white">{m.topic}</span><span className="text-blue-400">{m.value}°C</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="pt-6 border-t border-slate-100 mt-8 flex flex-col md:flex-row gap-4">
                                <button onClick={() => setActiveSection('mqtt')} className="flex items-center justify-center gap-3 bg-slate-100 px-8 py-4 rounded-2xl font-bold"><Icons.ArrowLeft className="w-5 h-5" /> Volver</button>
                                <button onClick={() => setActiveSection('industrial')} className="flex-1 flex items-center justify-center gap-3 bg-orange-600 hover:bg-orange-700 text-white px-8 py-4 rounded-2xl font-bold transition-all shadow-lg shadow-orange-200">Ingeniería e IoT <Icons.Factory className="w-5 h-5" /></button>
                            </div>
                        </div>
                    )
                },
                industrial: {
                    title: "Ingeniería Industrial & IoT",
                    icon: Icons.Factory,
                    color: "text-orange-500",
                    bg: "bg-orange-50",
                    border: "border-orange-100",
                    content: (
                        <div className="space-y-6">
                            <p className="text-lg text-gray-700 font-medium">En la <strong>Industria 4.0</strong>, el Ingeniero Industrial es el puente entre el mundo físico y la inteligencia de datos.</p>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div className="p-5 bg-orange-50 rounded-2xl border border-orange-100">
                                    <div className="flex items-center gap-3 mb-2"><Icons.TrendingUp className="text-orange-600 w-5 h-5" /><h5 className="font-bold text-orange-800">Optimización en Vivo</h5></div>
                                    <p className="text-sm text-gray-600">Toma decisiones con datos que están ocurriendo en la línea de producción ahora mismo.</p>
                                </div>
                                <div className="p-5 bg-blue-50 rounded-2xl border border-blue-100">
                                    <div className="flex items-center gap-3 mb-2"><Icons.Settings className="text-blue-600 w-5 h-5" /><h5 className="font-bold text-blue-800">Autonomía Técnica</h5></div>
                                    <p className="text-sm text-gray-600">Conecta procesos sin depender exclusivamente de un departamento externo.</p>
                                </div>
                            </div>
                            <div className="pt-6 border-t border-slate-100 mt-8 flex flex-col md:flex-row gap-4">
                                <button onClick={() => setActiveSection('pubsub')} className="flex items-center justify-center gap-3 bg-slate-100 px-8 py-4 rounded-2xl font-bold"><Icons.ArrowLeft className="w-5 h-5" /> Volver</button>
                                <button onClick={() => setActiveSection('conclusion')} className="flex-1 flex items-center justify-center gap-3 bg-slate-900 hover:bg-black text-white px-8 py-4 rounded-2xl font-bold transition-all shadow-lg shadow-slate-300">Conclusión Final <Icons.Flag className="w-5 h-5" /></button>
                            </div>
                        </div>
                    )
                },
                conclusion: {
                    title: "Resumen y Cierre",
                    icon: Icons.CheckCircle,
                    color: "text-green-600",
                    bg: "bg-green-50",
                    border: "border-green-100",
                    content: (
                        <div className="space-y-6">
                            <div className="bg-green-50 border border-green-100 rounded-3xl p-8 text-center">
                                <div className="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6"><Icons.CheckCircle className="w-10 h-10 text-green-600" /></div>
                                <h4 className="text-2xl font-bold text-green-900 mb-4">¿Por qué es vital aprenderlo?</h4>
                                <div className="space-y-4 text-left max-w-md mx-auto">
                                    <div className="flex gap-3"><div className="w-6 h-6 bg-green-200 rounded-full flex items-center justify-center shrink-0 mt-1"><span className="text-xs font-bold text-green-700">1</span></div><p className="text-gray-700"><strong>Agilidad:</strong> Implementas soluciones en minutos, no en meses.</p></div>
                                    <div className="flex gap-3"><div className="w-6 h-6 bg-green-200 rounded-full flex items-center justify-center shrink-0 mt-1"><span className="text-xs font-bold text-green-700">2</span></div><p className="text-gray-700"><strong>Visibilidad:</strong> Lo que no se mide, no se mejora.</p></div>
                                    <div className="flex gap-3"><div className="w-6 h-6 bg-green-200 rounded-full flex items-center justify-center shrink-0 mt-1"><span className="text-xs font-bold text-green-700">3</span></div><p className="text-gray-700"><strong>Futuro:</strong> La industria digitalizada es el estándar.</p></div>
                                </div>
                            </div>
                            <div className="pt-6 text-center">
                                <button onClick={() => setActiveSection('intro')} className="inline-flex items-center gap-2 text-slate-400 hover:text-red-600 transition-colors font-medium">Reiniciar presentación <Icons.ArrowLeft className="w-4 h-4" /></button>
                            </div>
                        </div>
                    )
                }
            };

            const ActiveIcon = sections[activeSection].icon;

            return (
                <div className="min-h-screen">
                    <nav className="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50">
                        <div className="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2 cursor-pointer" onClick={() => setActiveSection('intro')}>
                                <div className="w-8 h-8 bg-red-600 rounded flex items-center justify-center shadow-lg shadow-red-100"><Icons.Cpu className="w-5 h-5 text-white" /></div>
                                <h1 className="font-bold text-lg tracking-tight hidden sm:block">IoT <span className="text-red-600 font-extrabold">Node-RED</span></h1>
                            </div>
                            <div className="hidden lg:flex gap-1 text-sm font-medium">
                                {Object.keys(sections).map((key) => {
                                    const NavIcon = sections[key].icon;
                                    return (
                                        <button key={key} onClick={() => setActiveSection(key)} className={`px-4 py-2 rounded-xl transition-all flex items-center gap-2 ${activeSection === key ? 'bg-slate-900 text-white' : 'text-slate-500 hover:bg-slate-50'}`}>
                                            <NavIcon className="w-4 h-4" />
                                            <span className="capitalize">{key === 'pubsub' ? 'Simulador' : key === 'industrial' ? 'Ingeniería' : key === 'intro' ? 'Inicio' : key === 'conclusion' ? 'Final' : key}</span>
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                        {/* Mobile Nav */}
                        <div className="flex lg:hidden bg-white border-t border-slate-100 overflow-x-auto no-scrollbar">
                            {Object.keys(sections).map((key) => {
                                const MobileIcon = sections[key].icon;
                                return (
                                    <button key={key} onClick={() => setActiveSection(key)} className={`flex-1 py-4 flex flex-col items-center gap-1 min-w-[80px] transition-all border-b-2 ${activeSection === key ? 'text-red-600 border-red-600' : 'text-slate-300 border-transparent'}`}>
                                        <MobileIcon className="w-5 h-5" />
                                        <span className="text-[10px] font-bold uppercase tracking-tighter">{key === 'pubsub' ? 'Sim' : key === 'industrial' ? 'Ing' : key}</span>
                                    </button>
                                );
                            })}
                        </div>
                    </nav>

                    <main className="max-w-4xl mx-auto px-4 py-8 md:py-12">
                        <header className="mb-10 text-center">
                            <h2 className="text-3xl md:text-4xl font-black text-slate-900 mb-4 tracking-tight uppercase">
                                {activeSection === 'intro' ? 'Node-RED y MQTT' : sections[activeSection].title}
                            </h2>
                            <div className="w-16 h-1 bg-red-600 mx-auto rounded-full"></div>
                        </header>
                        <div className="bg-white rounded-[2rem] shadow-2xl shadow-slate-200 border border-slate-100 overflow-hidden relative">
                            <div className="p-8 md:p-14">
                                <div key={activeSection}>
                                    <div className="flex items-center gap-5 mb-10">
                                        <div className="p-4 bg-slate-50 rounded-2xl shadow-inner">
                                            <ActiveIcon className={`w-8 h-8 ${sections[activeSection].color}`} />
                                        </div>
                                        <h3 className="text-3xl font-black text-slate-800 tracking-tight">{sections[activeSection].title}</h3>
                                    </div>
                                    <div className="animate-in fade-in slide-in-from-bottom-6 duration-700 ease-out">
                                        {sections[activeSection].content}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    <footer className="py-12 text-center border-t border-slate-200 bg-white mt-12 px-4">
                        <div className="max-w-5xl mx-auto flex flex-col items-center gap-6">
                            <p className="text-slate-500 text-sm md:text-base font-medium">
                                Utiliza el menú superior para navegar por los temas de la ponencia.
                            </p>
                            <a 
                                href="index.html" 
                                className="inline-flex items-center gap-3 px-8 py-3 bg-slate-900 hover:bg-black text-white rounded-2xl transition-all shadow-lg hover:shadow-slate-200 font-bold group"
                            >
                                <Icons.Home className="w-5 h-5 group-hover:scale-110 transition-transform" />
                                Regresar al Inicio
                            </a>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
